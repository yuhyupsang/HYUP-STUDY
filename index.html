<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISTQB CTFL 4.0 — 실전 모의고사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #0d0d16;
  --surface: #12121e;
  --surface2: #1a1a2e;
  --border: #1e1e35;
  --border2: #26264a;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --accent3: #38bdf8;
  --green: #22d3a5;
  --red: #f87171;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --text: #e8e8f8;
  --text2: #9090b8;
  --text3: #505075;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  line-height: 1.7;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ══════════════════════════════════
   START SCREEN
══════════════════════════════════ */
#start-screen {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.glow-orb-1 {
  width: 500px; height: 500px;
  background: rgba(108,99,255,0.12);
  top: -150px; left: -100px;
}
.glow-orb-2 {
  width: 400px; height: 400px;
  background: rgba(56,189,248,0.08);
  bottom: -100px; right: -100px;
}

.start-inner {
  position: relative;
  z-index: 1;
  max-width: 520px;
  width: 100%;
}

.start-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--accent2);
  background: rgba(108,99,255,0.1);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: 100px;
  padding: 7px 18px;
  margin-bottom: 32px;
}
.pulse-dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.start-title {
  font-size: clamp(2.4rem, 7vw, 4.2rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: 20px;
}
.start-title .t1 {
  display: block;
  background: linear-gradient(135deg, #fff 20%, rgba(255,255,255,0.6));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.start-title .t2 {
  display: block;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.start-desc {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 40px;
  line-height: 1.8;
}

.stats-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.stat-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 16px 20px;
  min-width: 90px;
}
.stat-n {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-l {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.04em;
}

.start-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 28px;
}

.option-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 13px;
  gap: 12px;
}
.option-label { color: var(--text2); }
.option-val {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent2);
  background: rgba(108,99,255,0.1);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: 8px;
  padding: 4px 12px;
}

.btn-start {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 8px 30px rgba(108,99,255,0.35);
  position: relative;
  overflow: hidden;
}
.btn-start::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.btn-start:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 14px 40px rgba(108,99,255,0.45); }
.btn-start:hover::before { opacity: 1; }
.btn-start:active { transform: translateY(0); }

/* ══════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════ */
#quiz-screen { padding: 0; }

.quiz-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}

.quiz-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.q-counter {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text3);
}
.q-counter span { color: var(--accent2); font-weight: 700; }

.q-tags {
  display: flex;
  gap: 6px;
}
.q-tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text3);
}
.q-tag.ch { color: var(--accent3); border-color: rgba(56,189,248,0.2); background: rgba(56,189,248,0.06); }
.q-tag.lo { color: var(--accent2); border-color: rgba(167,139,250,0.2); background: rgba(167,139,250,0.06); }
.q-tag.kl { color: var(--yellow); border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.06); }
.q-tag.src { color: var(--text3); }

/* progress strip */
.progress-strip {
  display: flex;
  gap: 3px;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
}
.ps-seg {
  flex: 1;
  background: var(--border);
  border-radius: 2px;
  transition: background 0.3s;
  cursor: pointer;
}
.ps-seg.answered { background: var(--accent); }
.ps-seg.correct { background: var(--green); }
.ps-seg.wrong { background: var(--red); }

/* quiz body */
.quiz-body {
  flex: 1;
  max-width: 760px;
  margin: 0 auto;
  width: 100%;
  padding: 32px 20px 40px;
}

.q-num-badge {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 16px;
  letter-spacing: 0.06em;
}

.q-text {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 28px;
}

/* Table question */
.q-table-wrap {
  margin: 16px 0 24px;
  overflow-x: auto;
  border-radius: 10px;
  border: 1px solid var(--border2);
}
.q-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.q-table th {
  background: var(--surface2);
  color: var(--accent2);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
}
.q-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  vertical-align: top;
  line-height: 1.5;
}
.q-table tr:last-child td { border-bottom: none; }
.q-table tr:hover td { background: rgba(108,99,255,0.04); }

/* State diagram */
.state-diagram {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 20px;
  margin: 16px 0 24px;
  font-family: var(--mono);
  font-size: 12px;
  overflow-x: auto;
}
.sd-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: nowrap;
  white-space: nowrap;
}
.sd-state {
  background: var(--surface2);
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  padding: 6px 14px;
  color: var(--text);
  font-size: 12px;
  white-space: nowrap;
}
.sd-arrow {
  color: var(--text3);
  font-size: 16px;
  flex-shrink: 0;
}
.sd-label {
  color: var(--accent2);
  font-size: 11px;
  background: rgba(108,99,255,0.08);
  border: 1px solid rgba(108,99,255,0.15);
  border-radius: 6px;
  padding: 3px 8px;
}

/* Code block in question */
.q-code {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent3);
  margin: 12px 0 20px;
  overflow-x: auto;
  line-height: 1.6;
  white-space: pre;
}

/* Options */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.opt {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  user-select: none;
}
.opt:hover:not(.disabled) {
  border-color: var(--accent);
  background: rgba(108,99,255,0.07);
  transform: translateX(3px);
}
.opt.selected {
  border-color: var(--accent);
  background: rgba(108,99,255,0.1);
}
.opt.correct {
  border-color: var(--green) !important;
  background: rgba(34,211,165,0.08) !important;
}
.opt.wrong {
  border-color: var(--red) !important;
  background: rgba(248,113,113,0.08) !important;
}
.opt.missed {
  border-color: var(--yellow) !important;
  background: rgba(251,191,36,0.06) !important;
}
.opt.disabled { cursor: default; }

.opt-letter {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text3);
  flex-shrink: 0;
  margin-top: 1px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.opt.selected .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
.opt.correct .opt-letter { background: var(--green); border-color: var(--green); color: #000; }
.opt.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }
.opt.missed .opt-letter { background: var(--yellow); border-color: var(--yellow); color: #000; }

.opt-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text2);
  flex: 1;
  transition: color 0.15s;
}
.opt:hover:not(.disabled) .opt-text { color: var(--text); }
.opt.correct .opt-text, .opt.missed .opt-text { color: var(--text); }

/* Explanation panel */
.explanation {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.explanation.show { display: block; }

.exp-header {
  padding: 14px 18px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.exp-result-badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 6px;
}
.exp-result-badge.correct { background: rgba(34,211,165,0.15); color: var(--green); border: 1px solid rgba(34,211,165,0.3); }
.exp-result-badge.wrong { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }

.exp-body { padding: 18px; }

.exp-answer {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.exp-answer strong { color: var(--green); }

.exp-rationale {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text2);
  margin-bottom: 16px;
}
.exp-rationale strong { color: var(--text); }

.exp-options-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

.exp-option {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 13px;
  line-height: 1.55;
}
.exp-option.is-correct { background: rgba(34,211,165,0.07); border: 1px solid rgba(34,211,165,0.2); }
.exp-option.is-wrong { background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.1); }

.exp-opt-letter {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  width: 22px; height: 22px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.is-correct .exp-opt-letter { background: rgba(34,211,165,0.2); color: var(--green); }
.is-wrong .exp-opt-letter { background: rgba(248,113,113,0.15); color: var(--red); }

.exp-opt-content { flex: 1; }
.exp-opt-text { color: var(--text2); margin-bottom: 4px; }
.exp-opt-reason {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
}
.is-correct .exp-opt-reason { color: rgba(34,211,165,0.7); }
.is-wrong .exp-opt-reason { color: rgba(248,113,113,0.6); }

/* nav buttons */
.quiz-nav {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.btn {
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  box-shadow: 0 4px 16px rgba(108,99,255,0.3);
}
.btn-ghost {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text2);
}
.btn-submit {
  background: linear-gradient(135deg, var(--green), #0ea5e9);
  color: #000;
  font-weight: 700;
  box-shadow: 0 4px 16px rgba(34,211,165,0.25);
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

/* ══════════════════════════════════
   RESULT SCREEN
══════════════════════════════════ */
#result-screen {
  align-items: center;
  justify-content: flex-start;
  padding: 40px 20px 60px;
}

.result-inner {
  max-width: 700px;
  width: 100%;
  margin: 0 auto;
}

.result-header {
  text-align: center;
  margin-bottom: 36px;
}

.result-score-ring {
  width: 130px; height: 130px;
  margin: 0 auto 20px;
  position: relative;
}
.result-score-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border2); stroke-width: 8; }
.ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-pct {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.ring-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.result-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 8px;
}
.result-subtitle { font-size: 14px; color: var(--text2); }

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}
.rs-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}
.rs-n { font-family: var(--mono); font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.rs-l { font-size: 11px; color: var(--text3); }
.rs-n.green { color: var(--green); }
.rs-n.red { color: var(--red); }
.rs-n.text { color: var(--text2); }

.result-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.result-actions .btn { flex: 1; min-width: 140px; }

.wrong-list-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}

.wrong-item {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--red);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.wrong-item:hover { border-color: var(--accent); background: rgba(108,99,255,0.05); }
.wi-meta { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 6px; }
.wi-text { font-size: 13px; line-height: 1.5; color: var(--text2); }
.wi-ans {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  font-size: 12px;
  font-family: var(--mono);
}
.wi-my { color: var(--red); }
.wi-correct { color: var(--green); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .start-title { font-size: 2.2rem; }
  .result-stats { grid-template-columns: repeat(3,1fr); }
  .quiz-body { padding: 20px 14px 32px; }
  .q-text { font-size: 15px; }
  .opt-text { font-size: 13px; }
  .result-actions { flex-direction: column; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<!-- ═══════════════ START ═══════════════ -->
<div id="start-screen" class="screen active">
  <div class="start-inner">
    <div class="start-badge"><div class="pulse-dot"></div>ISTQB CTFL 4.0</div>
    <h1 class="start-title">
      <span class="t1">실전 모의고사</span>
      <span class="t2">MOCK EXAM</span>
    </h1>
    <p class="start-desc">
      공식 샘플 A·B·C·D + 추가 생성 문제 전체 풀에서<br>
      무작위 40문항 출제 · 보기별 상세 해설 제공
    </p>
    <div class="stats-row">

// ═══════════════════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════════════════
let sessionQuestions = [];
let answers = {};
let currentIdx = 0;
let retryMode = false;

document.getElementById('total-q-count').textContent = ALL_QUESTIONS.length + '+';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(questionSet) {
  answers = {};
  currentIdx = 0;
  sessionQuestions = questionSet || shuffle(ALL_QUESTIONS).slice(0, 40);
  buildProgressStrip();
  renderQuestion(0);
  switchScreen('quiz-screen');
}

function resetQuiz() {
  retryMode = false;
  startQuiz();
}

function retryWrong() {
  const wrongQs = sessionQuestions.filter((q, i) => {
    const a = answers[i];
    return a === undefined || a !== q.ans;
  });
  if (wrongQs.length === 0) { alert('오답이 없습니다! 🎉'); return; }
  retryMode = true;
  startQuiz(shuffle(wrongQs));
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function buildProgressStrip() {
  const strip = document.getElementById('progress-strip');
  strip.innerHTML = '';
  sessionQuestions.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'ps-seg';
    seg.onclick = () => navigate(i - currentIdx);
    strip.appendChild(seg);
  });
}

function updateProgressStrip() {
  const segs = document.querySelectorAll('.ps-seg');
  sessionQuestions.forEach((q, i) => {
    const seg = segs[i];
    seg.classList.remove('answered', 'correct', 'wrong');
    if (answers[i] !== undefined) {
      seg.classList.add(answers[i] === q.ans ? 'correct' : 'wrong');
    }
    if (i === currentIdx) seg.style.outline = '2px solid var(--accent2)';
    else seg.style.outline = '';
  });
}

function renderQuestion(idx) {
  const q = sessionQuestions[idx];
  currentIdx = idx;

  document.getElementById('cur-num').textContent = idx + 1;
  document.getElementById('total-num').textContent = sessionQuestions.length;
  document.getElementById('tag-ch').textContent = 'CH' + q.ch;
  document.getElementById('tag-lo').textContent = q.lo;
  document.getElementById('tag-kl').textContent = q.k;
  document.getElementById('tag-src').textContent = '샘플 ' + q.src;
  document.getElementById('q-num-badge').textContent = `Q${idx + 1}`;

  // Question text
  const qText = document.getElementById('q-text');
  qText.innerHTML = q.q.replace(/\n/g, '<br>');

  // Visual (table or state diagram)
  const qVis = document.getElementById('q-visual');
  qVis.innerHTML = '';
  if (q.visual) {
    if (q.visual.type === 'table') {
      qVis.innerHTML = buildTable(q.visual);
    } else if (q.visual.type === 'state') {
      qVis.innerHTML = buildStateDiagram(q.visual);
    }
  }

  // Options
  const optList = document.getElementById('options-list');
  optList.innerHTML = '';
  const letters = ['a', 'b', 'c', 'd'];
  const answered = answers[idx] !== undefined;

  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'opt';
    if (answered) {
      div.classList.add('disabled');
      if (i === q.ans) div.classList.add('correct');
      else if (answers[idx] === i) div.classList.add('wrong');
    } else {
      div.onclick = () => selectOption(i);
    }
    div.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-text">${opt}</div>`;
    optList.appendChild(div);
  });

  // Explanation
  const exp = document.getElementById('explanation');
  if (answered) {
    exp.classList.add('show');
    const isCorrect = answers[idx] === q.ans;
    exp.innerHTML = buildExplanation(q, answers[idx], isCorrect);
  } else {
    exp.classList.remove('show');
    exp.innerHTML = '';
  }

  // Nav buttons
  const btnConfirm = document.getElementById('btn-confirm');
  const btnNext = document.getElementById('btn-next');
  const btnFinish = document.getElementById('btn-finish');
  const btnPrev = document.getElementById('btn-prev');

  if (answered) {
    btnConfirm.style.display = 'none';
    if (idx < sessionQuestions.length - 1) {
      btnNext.style.display = '';
      btnFinish.style.display = 'none';
    } else {
      btnNext.style.display = 'none';
      btnFinish.style.display = '';
    }
  } else {
    btnConfirm.style.display = '';
    btnNext.style.display = 'none';
    btnFinish.style.display = 'none';
  }
  btnPrev.disabled = idx === 0;

  updateProgressStrip();
}

function buildTable(vis) {
  let html = '<div class="q-table-wrap"><table class="q-table"><thead><tr>';
  vis.headers.forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';
  vis.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => { html += `<td>${cell}</td>`; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function buildStateDiagram(vis) {
  let html = '<div class="state-diagram">';
  vis.transitions.forEach(t => {
    html += `<div class="sd-row">
      <div class="sd-state">${t.from}</div>
      <div class="sd-arrow">→</div>
      <div class="sd-label">${t.label}</div>
      <div class="sd-arrow">→</div>
      <div class="sd-state">${t.to}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function buildExplanation(q, myAns, isCorrect) {
  const letters = ['a', 'b', 'c', 'd'];
  let html = `
    <div class="exp-header">
      <span class="exp-result-badge ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✅ 정답' : '❌ 오답'}</span>
    </div>
    <div class="exp-body">
      <div class="exp-answer">정답: <strong>${letters[q.ans].toUpperCase()}. ${q.opts[q.ans]}</strong></div>
      <div class="exp-rationale">${q.exp.correct}</div>
      <div class="exp-options-title">보기별 해설</div>
  `;
  q.opts.forEach((opt, i) => {
    const isCor = i === q.ans;
    html += `
      <div class="exp-option ${isCor ? 'is-correct' : 'is-wrong'}">
        <div class="exp-opt-letter">${letters[i]}</div>
        <div class="exp-opt-content">
          <div class="exp-opt-text">${opt}</div>
          <div class="exp-opt-reason">${q.exp.opts[i]}</div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  return html;
}

function selectOption(i) {
  if (answers[currentIdx] !== undefined) return;
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => o.classList.remove('selected'));
  opts[i].classList.add('selected');
  opts.forEach(o => o.dataset.sel = '');
  opts[i].dataset.sel = i;
  document.getElementById('btn-confirm').dataset.sel = i;
}

function confirmAnswer() {
  const btnConfirm = document.getElementById('btn-confirm');
  const selVal = document.querySelector('.opt.selected');
  if (!selVal) { alert('보기를 선택해주세요!'); return; }
  const i = parseInt(selVal.querySelector('.opt-letter').textContent.charCodeAt(0) - 97);
  // Re-derive index
  const opts = document.querySelectorAll('.opt');
  let sel = -1;
  opts.forEach((o, idx) => { if (o.classList.contains('selected')) sel = idx; });
  if (sel === -1) { alert('보기를 선택해주세요!'); return; }
  answers[currentIdx] = sel;
  renderQuestion(currentIdx);
}

function navigate(delta) {
  const newIdx = currentIdx + delta;
  if (newIdx < 0 || newIdx >= sessionQuestions.length) return;
  renderQuestion(newIdx);
}

function showResult() {
  let correct = 0, wrong = 0, skip = 0;
  sessionQuestions.forEach((q, i) => {
    if (answers[i] === undefined) skip++;
    else if (answers[i] === q.ans) correct++;
    else wrong++;
  });

  const total = sessionQuestions.length;
  const pct = Math.round((correct / total) * 100);
  const pass = pct >= 65;

  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent = wrong;
  document.getElementById('rs-skip').textContent = skip;
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('result-title').textContent = pass ? '🎉 합격 수준 달성!' : '💪 더 노력해봐요!';
  document.getElementById('result-subtitle').textContent = `${correct}/${total} 정답 · ${pass ? '합격 기준(65%) 통과' : '합격 기준(65%) 미달'}`;

  // Ring animation
  const ring = document.getElementById('ring-fill');
  const circumference = 2 * Math.PI * 52;
  const strokeColor = pass ? '#22d3a5' : pct >= 50 ? '#fbbf24' : '#f87171';
  ring.style.stroke = strokeColor;
  setTimeout(() => {
    ring.style.strokeDashoffset = circumference * (1 - pct / 100);
  }, 100);

  // Wrong list
  const wl = document.getElementById('wrong-list');
  wl.innerHTML = '';
  sessionQuestions.forEach((q, i) => {
    if (answers[i] !== undefined && answers[i] === q.ans) return;
    const letters = ['a','b','c','d'];
    const div = document.createElement('div');
    div.className = 'wrong-item';
    div.onclick = () => { navigate(i - currentIdx); switchScreen('quiz-screen'); };
    const myA = answers[i] !== undefined ? letters[answers[i]].toUpperCase() : '미응답';
    const corA = letters[q.ans].toUpperCase();
    div.innerHTML = `
      <div class="wi-meta">Q${i+1} · CH${q.ch} · ${q.lo} · ${q.k} · 샘플 ${q.src}</div>
      <div class="wi-text">${q.q.replace(/\n/g,'').substring(0, 80)}...</div>
      <div class="wi-ans">
        <span class="wi-my">내 답: ${myA}</span>
        <span class="wi-correct">정답: ${corA}</span>
      </div>
    `;
    wl.appendChild(div);
  });

  switchScreen('result-screen');
}

// Init
switchScreen('start-screen');
</script>
